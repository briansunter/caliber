name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install reader utilities
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release checks
        run: bun run check

  release-please:
    name: Create Release
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out released version
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Get npm token from Bitwarden Secrets Manager
        id: bws
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          secrets: |
            ${{ secrets.BWS_NPM_TOKEN_SECRET_ID }} > NPM_TOKEN

      - name: Configure npm authentication
        env:
          NPM_TOKEN: ${{ steps.bws.outputs.NPM_TOKEN }}
        run: |
          npmrc="$RUNNER_TEMP/caliber-app.npmrc"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > "$npmrc"
          echo "NPM_CONFIG_USERCONFIG=$npmrc" >> "$GITHUB_ENV"

      - name: Publish to npm
        run: npm publish --access public
